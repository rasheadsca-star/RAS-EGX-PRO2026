<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>EGX Pro — مركز القرار الموحد V12</title>

  <link rel="stylesheet" href="./assets/css/unified-goal-v12.css?v=12.0.1">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #07111f;
      color: #f4f8fc;
      font-family: Tahoma, Arial, sans-serif;
    }

    .v12-startup {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .v12-startup-card {
      width: min(680px, 100%);
      padding: 28px;
      box-sizing: border-box;
      border: 1px solid #28415f;
      border-radius: 20px;
      background: #0e1b2d;
      text-align: center;
      box-shadow: 0 28px 80px rgba(0, 0, 0, .45);
    }

    .v12-startup-card h1 {
      margin: 0 0 12px;
      font-size: 26px;
    }

    .v12-startup-card p {
      margin: 8px 0;
      color: #9eb0c4;
      line-height: 1.8;
    }

    .v12-open-btn {
      margin-top: 18px;
      border: 1px solid #54779c;
      border-radius: 12px;
      padding: 12px 18px;
      background: linear-gradient(135deg, #0b5f91, #173554);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .v12-error {
      display: none;
      margin-top: 18px;
      padding: 12px;
      border: 1px solid #8b3434;
      border-radius: 12px;
      background: #3a1212;
      color: #fecaca;
      line-height: 1.8;
      text-align: right;
    }
  </style>
</head>
<body>
  <main class="v12-startup">
    <section class="v12-startup-card">
      <h1>EGX Pro — مركز القرار الموحد V12</h1>
      <p>محرك PRO2026 + واجهة GOAL + تحقق صارم + تداول ورقي وقياس نتائج.</p>
      <p id="v12-status">جارٍ تحميل مركز القرار…</p>
      <button id="v12-manual-open" class="v12-open-btn" type="button">
        فتح مركز القرار V12
      </button>
      <div id="v12-error" class="v12-error"></div>
    </section>
  </main>

  <script src="./assets/js/unified-goal-v12.js?v=12.0.1"></script>
  <script>
    (function () {
      const status = document.getElementById('v12-status');
      const errorBox = document.getElementById('v12-error');
      const button = document.getElementById('v12-manual-open');

      function showError(message) {
        status.textContent = 'تعذر تشغيل V12.';
        errorBox.style.display = 'block';
        errorBox.textContent = message;
      }

      function openV12() {
        if (window.EGXUnifiedGoalV12 && typeof window.EGXUnifiedGoalV12.open === 'function') {
          status.textContent = 'تم تحميل V12 بنجاح.';
          window.EGXUnifiedGoalV12.open();
          return true;
        }
        return false;
      }

      button.addEventListener('click', function () {
        if (!openV12()) {
          showError(
            'لم يتم تحميل ملف assets/js/unified-goal-v12.js. تأكد أن الملف موجود في المسار الصحيح ثم حدّث الصفحة.'
          );
        }
      });

      window.addEventListener('load', function () {
        setTimeout(function () {
          if (!openV12()) {
            showError(
              'ملفات V12 موجودة في المستودع، لكن المتصفح لم يستطع تشغيل JavaScript. افتح أدوات المطور F12 ثم Console لمعرفة الخطأ.'
            );
          }
        }, 250);
      });
    })();
  </script>
</body>
</html>
