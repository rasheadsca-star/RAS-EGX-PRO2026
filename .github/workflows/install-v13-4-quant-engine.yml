name: Install & Run V13.4 Quant Engine

on:
  push:
    paths:
      - ".github/workflows/install-v13-4-quant-engine.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-4-quant-engine
  cancel-in-progress: false

jobs:
  install-run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install V13.4 files
        shell: bash
        run: |
          set -euo pipefail
          python3 -c "import base64,io,tarfile; data=base64.b64decode(''); t=tarfile.open(fileobj=io.BytesIO(data),mode='r:gz'); allowed=['.github/workflows/egx-quant-research-v13-4.yml', 'scripts/quant/v13-4-quant-engine.cjs', 'scripts/quant/v13-4-acceptance.cjs', 'data/v13-4-quant-policy.json', 'preview-v13/recommendations.html', 'preview-v13/quant-research.html']; members=t.getmembers(); names=[m.name for m in members]; assert names==allowed, (names,allowed); assert all(not m.name.startswith('/') and '..' not in m.name.split('/') for m in members); t.extractall('.')"
          rm -f ".github/workflows/fix-v13-3-preview-page.yml"
          rm -f ".github/workflows/fix-v13-3-preview-page (1).yml"
          test -f scripts/quant/v13-4-quant-engine.cjs
          test -f preview-v13/recommendations.html
          echo "V13.4 files installed."

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate historical database
        shell: bash
        run: |
          set -euo pipefail
          test -d data/history || { echo "Missing data/history"; exit 1; }
          test -f data/symbol-map.json || { echo "Missing data/symbol-map.json"; exit 1; }
          test -f data/history-summary.json || { echo "Missing data/history-summary.json"; exit 1; }
          count="$(find data/history -maxdepth 1 -name '*.json' | wc -l)"
          test "$count" -gt 0 || { echo "No historical files found"; exit 1; }
          echo "Historical files: $count"
          node --check scripts/quant/v13-4-quant-engine.cjs
          node --check scripts/quant/v13-4-acceptance.cjs

      - name: Build and test V13.4
        shell: bash
        run: |
          set -euo pipefail
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-4-acceptance.cjs

      - name: Commit V13.4
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/egx-quant-research-v13-4.yml scripts/quant data/v13-4-quant-policy.json data/quant preview-v13/recommendations.html preview-v13/quant-research.html
          git add -u .github/workflows || true
          if git diff --cached --quiet; then
            echo "V13.4 is already installed and outputs are current."
          else
            git commit -m "Install V13.4 quant research and paper recommendations"
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.4
        id: deployment
        uses: actions/deploy-pages@v4
