name: Install & Run V13.12 Intraday Smart Alerts

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/install-v13-12-intraday-alerts.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-12-intraday-alerts
  cancel-in-progress: false

jobs:
  install-refresh-alert-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.12 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          payload = ""
          allowed = ['scripts/intraday/v13-12-intraday-monitor.cjs', 'scripts/intraday/v13-12-acceptance.cjs', 'data/v13-12-intraday-alert-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/daily-decision.html', 'preview-v13/app/intraday-monitor.html']
          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

      - name: Validate V13.12 dependencies
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/collect-market-gateway.js
            scripts/fetch-market-data.js
            data/quant/daily-decision-workspace-v13-11.json
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing dependency: $file"; exit 1; }
          done

      - name: Build first intraday snapshot
        env:
          EGX_FETCH_TIMEOUT_MS: "360000"
          EGX_SOURCE_FETCH_TIMEOUT_MS: "45000"
          EGX_GATEWAY_FULL_ROWS: "80"
          EGX_GATEWAY_CONDITIONAL_ROWS: "25"
        run: |
          node scripts/collect-market-gateway.js
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/intraday/v13-12-acceptance.cjs

      - name: Confirm stable V11 isolation
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v1312-install-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v1312-install-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.12
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             scripts/intraday/v13-12-intraday-monitor.cjs             scripts/intraday/v13-12-acceptance.cjs             data/v13-12-intraday-alert-policy.json             data/market.json             data/last-good-market.json             data/source-health.json             data/source-fetch-report.json             data/fetch-status.json             data/source-gateway-report.json             data/source-alerts.json             data/intraday             preview-v13/app/index.html             preview-v13/app/daily-decision.html             preview-v13/app/intraday-monitor.html
          if git diff --cached --quiet; then
            echo "V13.12 is already current."
          else
            git commit -m "Install V13.12 intraday monitor and smart alerts"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.12 attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait for active Pages deployment
        if: steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy V13.12 attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
