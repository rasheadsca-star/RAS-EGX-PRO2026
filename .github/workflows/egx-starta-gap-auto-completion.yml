name: EGX Starta OHLC Gap Auto Completion — V12.9

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "safe_apply"
        type: choice
        options:
          - diagnose
          - safe_apply
      ticker:
        description: "Optional single ticker"
        required: false
        default: ""
        type: string
      min_improved:
        description: "Minimum improved tickers required; use 0 for diagnostic-safe completion"
        required: true
        default: "0"
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-starta-gap-auto-completion
  cancel-in-progress: false

jobs:
  complete-gap:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate V12.9 package and stable-app isolation
        shell: bash
        run: |
          set -euo pipefail
          required=(
            .github/workflows/egx-starta-gap-auto-completion.yml
            scripts/history/starta-gap-auto-completion.cjs
            scripts/history/starta-gap-acceptance.cjs
            scripts/history/adapters/starta-ohlc-adapter.cjs
            scripts/history/history-validator.cjs
            scripts/history/history-storage.cjs
            scripts/history/history-summary-builder.cjs
            scripts/history/lib/utils.cjs
            data/history-starta-gap-config.json
            data/symbol-map.json
            data/history-summary.json
            preview-v12/starta-gap.html
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          node --check scripts/history/starta-gap-auto-completion.cjs
          node --check scripts/history/starta-gap-acceptance.cjs
          node --check scripts/history/adapters/starta-ohlc-adapter.cjs
          BEFORE_INDEX="$(sha256sum index.html 2>/dev/null | awk '{print $1}' || true)"
          BEFORE_SW="$(sha256sum service-worker.js 2>/dev/null | awk '{print $1}' || true)"
          echo "BEFORE_INDEX=$BEFORE_INDEX" >> "$GITHUB_ENV"
          echo "BEFORE_SW=$BEFORE_SW" >> "$GITHUB_ENV"

      - name: Fetch, verify and complete historical gaps
        env:
          STARTA_GAP_MODE: ${{ inputs.mode }}
          STARTA_GAP_TICKER: ${{ inputs.ticker }}
        run: node scripts/history/starta-gap-auto-completion.cjs

      - name: Run V12.9 acceptance tests
        env:
          STARTA_GAP_MODE: ${{ inputs.mode }}
          STARTA_GAP_MIN_IMPROVED: ${{ inputs.min_improved }}
        run: node scripts/history/starta-gap-acceptance.cjs

      - name: Enforce strict write isolation
        shell: bash
        run: |
          set -euo pipefail
          AFTER_INDEX="$(sha256sum index.html 2>/dev/null | awk '{print $1}' || true)"
          AFTER_SW="$(sha256sum service-worker.js 2>/dev/null | awk '{print $1}' || true)"
          test "$BEFORE_INDEX" = "$AFTER_INDEX" || { echo "SAFETY STOP: index.html changed"; exit 1; }
          test "$BEFORE_SW" = "$AFTER_SW" || { echo "SAFETY STOP: service-worker.js changed"; exit 1; }

          mapfile -t changed < <(
            {
              git diff --name-only
              git diff --cached --name-only
              git ls-files --others --exclude-standard
            } | sed '/^$/d' | sort -u
          )
          printf 'Changed files:\n'
          printf '%s\n' "${changed[@]:-none}"
          for file in "${changed[@]}"; do
            case "$file" in
              data/history/*.json|data/history-summary.json|data/session-calendar.json|data/source-audit.json|data/history-last-run.json|data/history-approved-gap-queue.json|data/history-starta-gap-report.json|data/history-starta-gap-quarantine.json)
                ;;
              *)
                echo "SAFETY STOP: forbidden changed path: $file"
                exit 1
                ;;
            esac
          done

      - name: Commit valid V12.9 outputs only
        if: ${{ inputs.mode != 'diagnose' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history/*.json data/history-summary.json data/session-calendar.json data/source-audit.json data/history-last-run.json data/history-approved-gap-queue.json data/history-starta-gap-report.json data/history-starta-gap-quarantine.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No valid data changes to commit."
            exit 0
          fi
          git commit -m "V12.9 safely complete historical gaps from public EGX OHLC API"
          git push origin HEAD:main

      - name: Commit diagnostic report
        if: ${{ inputs.mode == 'diagnose' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history-starta-gap-report.json data/history-starta-gap-quarantine.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "V12.9 diagnose Starta OHLC historical gaps"
          git push origin HEAD:main

      - name: Upload V12.9 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v12-9-starta-gap-diagnostics
          path: |
            data/history-starta-gap-report.json
            data/history-starta-gap-quarantine.json
          if-no-files-found: warn

  deploy:
    needs: complete-gap
    if: ${{ success() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload current repository
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
