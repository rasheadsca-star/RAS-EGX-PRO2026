name: Repair V13.4 Installation

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: repair-v13-4-installation
  cancel-in-progress: false

jobs:
  repair-install-run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.4 engine and pages
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import io
          import tarfile

          payload = ""
          data = base64.b64decode(payload)
          allowed = ['scripts/quant/v13-4-quant-engine.cjs', 'scripts/quant/v13-4-acceptance.cjs', 'data/v13-4-quant-policy.json', 'preview-v13/recommendations.html', 'preview-v13/quant-research.html']

          with tarfile.open(fileobj=io.BytesIO(data), mode="r:gz") as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              if names != allowed:
                  raise SystemExit(f"Unexpected package members: {names}")
              for member in members:
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

          test -f scripts/quant/v13-4-quant-engine.cjs
          test -f scripts/quant/v13-4-acceptance.cjs
          test -f data/v13-4-quant-policy.json
          test -f preview-v13/recommendations.html
          test -f preview-v13/quant-research.html
          echo "V13.4 engine files installed."

      - name: Validate historical database
        shell: bash
        run: |
          set -euo pipefail
          test -d data/history || { echo "Missing data/history"; exit 1; }
          test -f data/symbol-map.json || { echo "Missing data/symbol-map.json"; exit 1; }
          test -f data/history-summary.json || { echo "Missing data/history-summary.json"; exit 1; }
          count="$(find data/history -maxdepth 1 -name '*.json' | wc -l)"
          test "$count" -gt 0 || { echo "No historical files found"; exit 1; }
          echo "Historical symbol files: $count"
          node --check scripts/quant/v13-4-quant-engine.cjs
          node --check scripts/quant/v13-4-acceptance.cjs

      - name: Build and test V13.4
        shell: bash
        run: |
          set -euo pipefail
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-4-acceptance.cjs

      - name: Commit V13.4 without modifying workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add             scripts/quant/v13-4-quant-engine.cjs             scripts/quant/v13-4-acceptance.cjs             data/v13-4-quant-policy.json             data/quant             preview-v13/recommendations.html             preview-v13/quant-research.html

          if git diff --cached --quiet; then
            echo "V13.4 files are already current."
          else
            git commit -m "Install V13.4 quant research and recommendations"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.4 pages
        id: deployment
        uses: actions/deploy-pages@v4
