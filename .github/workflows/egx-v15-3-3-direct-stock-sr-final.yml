name: EGX V15.3.3 Direct Stock SR Final

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: egx-v15-3-3-direct-stock-sr
  cancel-in-progress: false

jobs:
  direct-stock-support-resistance:
    name: V15.3.3 Direct Stock SR
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EGX_SR_CONCURRENCY: '8'
      EGX_SR_TIMEOUT_MS: '25000'
      EGX_SR_MIN_ROWS: '80'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install direct-page parser
        run: npm install --no-save --no-package-lock cheerio@1.0.0

      - name: Install guaranteed V15.3.3 scripts
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64,pathlib
          files={
            'scripts/collect-mubasher-direct-stock-sr.js':'',
            'scripts/merge-mubasher-direct-stock-sr.js':'',
            'scripts/build-direct-stock-sr-decision.js':'',
            'scripts/verify-direct-stock-sr.js':'',
          }
          for rel,data in files.items():
              p=pathlib.Path(rel)
              p.parent.mkdir(parents=True,exist_ok=True)
              p.write_bytes(base64.b64decode(data))
              print('INSTALLED',rel,p.stat().st_size)
          PY

      - name: Validate direct-page scripts
        run: |
          set -euo pipefail
          node --check scripts/collect-mubasher-direct-stock-sr.js
          node --check scripts/merge-mubasher-direct-stock-sr.js
          node --check scripts/build-direct-stock-sr-decision.js
          node --check scripts/verify-direct-stock-sr.js
          test -f data/market.json
          echo 'V15.3.3 DIRECT-PAGE RUNTIME PASSED'

      - name: Refresh market prices
        run: |
          set -euo pipefail
          if [ -f scripts/fetch-market-data.js ]; then
            node scripts/fetch-market-data.js
          else
            echo '::warning::fetch-market-data.js missing; using current market.json.'
          fi

      - name: Collect each stock support and resistance page
        run: node scripts/collect-mubasher-direct-stock-sr.js

      - name: Merge verified direct stock levels
        run: node scripts/merge-mubasher-direct-stock-sr.js

      - name: Rebuild opportunity ranking
        run: |
          set -euo pipefail
          [ ! -f scripts/build-history-50-engine.js ] || node scripts/build-history-50-engine.js
          [ ! -f scripts/build-price-reconciliation-report.js ] || node scripts/build-price-reconciliation-report.js
          [ ! -f scripts/build-final-opportunity-ranking.js ] || node scripts/build-final-opportunity-ranking.js

      - name: Rebuild decision with direct stock S/R
        run: node scripts/build-direct-stock-sr-decision.js

      - name: V15.3.3 FINAL DIRECT STOCK SR VERIFICATION
        run: node scripts/verify-direct-stock-sr.js

      - name: Upload direct-page diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egx-v15-3-3-direct-stock-sr-diagnostics
          path: |
            data/mubasher-support-resistance-direct.json
            data/mubasher-support-resistance-direct-report.json
            data/support-resistance-verification.json
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified direct stock S/R data
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/*.json scripts/collect-mubasher-direct-stock-sr.js scripts/merge-mubasher-direct-stock-sr.js scripts/build-direct-stock-sr-decision.js scripts/verify-direct-stock-sr.js || true
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Use Mubasher individual stock pages for verified support resistance'
            git pull --rebase -X ours origin main
            git push origin main
          fi

      - name: Completed
        run: echo 'EGX V15.3.3 DIRECT STOCK SR COMPLETED'
