name: Apply EGX V15 Unified Final
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-egx-v15-unified-final.yml'
permissions:
  contents: write
concurrency:
  group: apply-egx-v15-unified-final
  cancel-in-progress: false
jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Write V15 unified files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, pathlib
          files = {
            'index.html': '',
            '404.html': '',
            'styles.css': '',
            'app.js': '',
            'manifest.json': '',
            'service-worker.js': '',
            'scripts/collect-mubasher-support-resistance-rendered.js': '',
            'scripts/merge-rendered-support-resistance.js': '',
            'scripts/stamp-atomic-truth.js': '',
            '.github/workflows/update-market-data.yml': '',
          }
          for rel, data in files.items():
              p = pathlib.Path(rel)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_bytes(base64.b64decode(data))
              print('WROTE', rel, p.stat().st_size)
          PY
      - name: Validate installed files
        run: |
          set -euo pipefail
          node --check app.js
          node --check service-worker.js
          node --check scripts/collect-mubasher-support-resistance-rendered.js
          node --check scripts/merge-rendered-support-resistance.js
          node --check scripts/stamp-atomic-truth.js
          python -m json.tool manifest.json >/dev/null
          grep -q 'V15.0.0-UNIFIED-TRUTH' app.js
          grep -q 'start_url' manifest.json
          grep -q 'Collect rendered Mubasher support and resistance' .github/workflows/update-market-data.yml
          echo 'INSTALLATION VALIDATION PASSED'
      - name: Commit V15 unified final
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html 404.html styles.css app.js manifest.json service-worker.js scripts/collect-mubasher-support-resistance-rendered.js scripts/merge-rendered-support-resistance.js scripts/stamp-atomic-truth.js .github/workflows/update-market-data.yml
          if git diff --cached --quiet; then
            echo 'V15 files already installed.'
          else
            git commit -m 'Install EGX V15 unified truth UI and rendered Mubasher SR'
            git pull --rebase -X ours origin main
            git push origin main
          fi
      - name: Final instructions
        run: |
          echo 'EGX V15 UNIFIED FINAL INSTALLED'
          echo 'Wait for pages-build-deployment, then run Update EGX Market Data once.'
