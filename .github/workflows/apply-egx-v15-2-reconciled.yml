name: Apply EGX V15.2 Reconciled Center
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-egx-v15-2-reconciled.yml'
permissions:
  contents: write
concurrency:
  group: apply-egx-v15-2-reconciled
  cancel-in-progress: false
jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Write reconciled UI and decision builder
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64,pathlib
          files={
            'index.html':'',
            '404.html':'',
            'styles.css':'',
            'app.js':'',
            'manifest.json':'',
            'service-worker.js':'',
            'reset.html':'',
            'scripts/build-goal-integrated-decision.js':'',
          }
          for rel,data in files.items():
              p=pathlib.Path(rel);p.parent.mkdir(parents=True,exist_ok=True)
              p.write_bytes(base64.b64decode(data));print('WROTE',rel,p.stat().st_size)
          PY
      - name: Validate JavaScript and manifest
        run: |
          set -euo pipefail
          node --check app.js
          node --check service-worker.js
          node --check scripts/build-goal-integrated-decision.js
          python -m json.tool manifest.json >/dev/null
          grep -q 'V15.2-RECONCILED' app.js
          grep -q '"id": "./?app=pwa"' manifest.json
          echo 'V15.2 FILE VALIDATION PASSED'
      - name: Rebuild decision now from existing ranking
        run: node scripts/build-goal-integrated-decision.js
      - name: Verify ranked opportunities are not erased
        run: |
          node - <<'NODE'
          const d=require('./data/today-decision-center.json');
          if(!d.ok) throw new Error('decision not ok');
          if(!Array.isArray(d.rankedOpportunities)) throw new Error('rankedOpportunities missing');
          console.log('Ranked:',d.summary.rankedCount,'Executable:',d.summary.executionCount,'Watch:',d.summary.conditionalWatchCount);
          console.log('RECONCILED DECISION VALIDATION PASSED');
          NODE
      - name: Commit only non-workflow application files
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html 404.html styles.css app.js manifest.json service-worker.js reset.html scripts/build-goal-integrated-decision.js data/today-decision-center.json
          if git diff --cached --quiet; then
            echo 'V15.2 already applied.'
          else
            git commit -m 'Apply V15.2 reconciled ranked opportunities center'
            git pull --rebase -X ours origin main
            git push origin main
          fi
      - name: Completion
        run: |
          echo 'V15.2 RECONCILED INSTALLED'
          echo 'Open /reset.html?v=15201 once after Pages deployment succeeds.'
