name: Unified GOAL V12

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update EGX Market Data"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: unified-goal-v12
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build strict decision, paper ledger and UI install
        run: node scripts/unified-goal-v12-build.js

      - name: Validate generated files
        run: |
          node --check scripts/unified-goal-v12-build.js
          node --check assets/js/unified-goal-v12.js
          node -e "const x=require('./data/unified-goal-v12.json'); if(!x.schemaVersion || !x.decision || !x.goLive) process.exit(1); console.log(x.decision);"
          git diff --check

      - name: Commit V12 outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/unified-goal-v12.js assets/css/unified-goal-v12.css data/unified-goal-v12.json data/v12-paper-ledger.json
          if [ -f service-worker.js ]; then git add service-worker.js; fi
          if git diff --cached --quiet; then
            echo "No V12 changes"
          else
            git commit -m "V12 unified GOAL decision and paper measurement"
            git push
          fi
