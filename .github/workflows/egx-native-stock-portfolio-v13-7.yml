name: EGX Native Stock Intelligence & Portfolio — V13.7

on:
  workflow_dispatch:
  schedule:
    - cron: "15 15 * * 0-4"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-native-stock-portfolio-v13-7
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build native stock intelligence
        run: |
          set -euo pipefail
          node scripts/quant/v13-7-stock-intelligence.cjs
          node scripts/quant/v13-7-acceptance.cjs
      - name: Commit V13.7 outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quant/stock-intelligence-index.json data/quant/stocks
          if git diff --cached --quiet; then
            echo "No V13.7 data changes."
          else
            git commit -m "Update V13.7 native stock intelligence"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload repository
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy V13.7
        id: deployment
        uses: actions/deploy-pages@v4
