name: Apply EGX V15.3 SR Assets
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-egx-v15-3-sr-assets.yml'
permissions:
  contents: write
concurrency:
  group: apply-egx-v15-3-sr-assets
  cancel-in-progress: false
jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Write V15.3 UI and SR scripts
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, pathlib
          files = {
            'index.html': '',
            '404.html': '',
            'styles.css': '',
            'app.js': '',
            'manifest.json': '',
            'service-worker.js': '',
            'reset.html': '',
            'scripts/build-goal-integrated-decision.js': '',
            'scripts/collect-mubasher-support-resistance-rendered.js': '',
            'scripts/merge-rendered-support-resistance.js': '',
            'scripts/verify-final-support-resistance.js': '',
          }
          for rel, data in files.items():
              p = pathlib.Path(rel)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_bytes(base64.b64decode(data))
              print('WROTE', rel, p.stat().st_size)
          PY
      - name: Validate installed assets
        run: |
          set -euo pipefail
          node --check app.js
          node --check service-worker.js
          node --check scripts/build-goal-integrated-decision.js
          node --check scripts/collect-mubasher-support-resistance-rendered.js
          node --check scripts/merge-rendered-support-resistance.js
          node --check scripts/verify-final-support-resistance.js
          python -m json.tool manifest.json >/dev/null
          grep -q 'V15.3' index.html
          grep -q 'V15.3-SR-TRUTH' service-worker.js
          grep -q '"id": "./?app=pwa"' manifest.json
          echo 'V15.3 ASSET VALIDATION PASSED'
      - name: Commit V15.3 assets
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html 404.html styles.css app.js manifest.json service-worker.js reset.html scripts/build-goal-integrated-decision.js scripts/collect-mubasher-support-resistance-rendered.js scripts/merge-rendered-support-resistance.js scripts/verify-final-support-resistance.js
          if git diff --cached --quiet; then
            echo 'V15.3 assets already installed.'
          else
            git commit -m 'Install V15.3 UI and verified Mubasher SR collector'
            git pull --rebase -X ours origin main
            git push origin main
          fi
      - name: Completion
        run: |
          echo 'V15.3 ASSETS INSTALLED'
          echo 'Now ensure update-market-data.yml was manually replaced, then run Update EGX Market Data.'
